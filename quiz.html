<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta description="CSS quiz">
    <meta author="Matthew Gifford">
    <title>WDD130 Quiz Assignment Matthew Gifford</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<header>
    <h1>Basic CSS Quiz</h1>
</header>
<body>
    <form>
        <fieldset>
            <label for="q1">What does CSS stand for?</label>
            <input type="text" id="q1" name="q1">
            <label for="q2">What is the purpose of CSS?</label>
            <textarea id="q2" name="q2" rows="4" placeholder="Type answer here"></textarea>
            <label for="q3">How do you put comments in CSS</label>
            <select id="q3" name="q3">
                <option value="" selected disabled>Choose One ...</option>
                <option value="option1">/* Comment */</option>
                <option value="option2">--Comment--</option>
                <option value="option3">**Comment**</option>
            </select>
            <label for="q4">If you have a padding of 10px, what is the padding of each side?</label>
            <input type="number" id="q4" name="q4">
        </fieldset>
        <button type="submit">Submit Quiz</button>
    </form>
</body>
</html>
